<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Purple Reset Password</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Manrope:wght@400;500;600&display=swap');

:root {
    --bg-dark: #0f172a;
    --bg-mid: #1e293b;
    --text-main: #f8fafc;
    --text-soft: #cbd5e1;
    --surface-line: rgba(255, 255, 255, 0.28);
    --field-bg: rgba(255, 255, 255, 0.1);
    --accent-a: #ff7a18;
    --accent-b: #00c2ff;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    font-family: 'Manrope', sans-serif;
    color: var(--text-main);
    display: grid;
    place-items: center;
    padding: 18px;
    background:
        radial-gradient(circle at 14% 18%, rgba(255, 122, 24, 0.34), transparent 42%),
        radial-gradient(circle at 82% 12%, rgba(0, 194, 255, 0.3), transparent 40%),
        linear-gradient(135deg, var(--bg-dark), var(--bg-mid));
}

.card {
    width: min(100%, 460px);
    background: linear-gradient(155deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.06));
    border: 1px solid var(--surface-line);
    border-radius: 22px;
    padding: 28px;
    box-shadow: 0 24px 70px rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(8px);
    animation: fadeUp 0.85s ease;
}

.brand {
    margin: 0;
    font-family: 'Syne', sans-serif;
    letter-spacing: 1px;
    font-size: 0.92rem;
    color: var(--text-soft);
}

h2 {
    margin: 10px 0 8px;
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.6rem, 4vw, 2rem);
    line-height: 1.1;
}

.subtext {
    margin: 0 0 18px;
    color: var(--text-soft);
    font-size: 0.95rem;
}

.field {
    margin-bottom: 12px;
}

label {
    display: block;
    margin-bottom: 6px;
    font-size: 0.86rem;
    color: #e2e8f0;
}

input {
    width: 100%;
    border: 1px solid rgba(255, 255, 255, 0.22);
    background: var(--field-bg);
    color: var(--text-main);
    border-radius: 12px;
    padding: 12px 13px;
    outline: none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

input::placeholder {
    color: #c1d3ea;
}

input:focus {
    border-color: rgba(0, 194, 255, 0.9);
    box-shadow: 0 0 0 3px rgba(0, 194, 255, 0.2);
}

.otp {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
}

.otp input {
    text-align: center;
    font-size: 1.1rem;
    padding: 12px 0;
}

button {
    width: 100%;
    margin-top: 16px;
    border: none;
    border-radius: 12px;
    padding: 12px;
    font-weight: 700;
    cursor: pointer;
    color: #04111f;
    background: linear-gradient(98deg, var(--accent-a), #ffd166);
    box-shadow: 0 10px 26px rgba(255, 122, 24, 0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 30px rgba(255, 122, 24, 0.45);
}

.back-link {
    text-align: center;
    margin: 14px 0 0;
    color: var(--text-soft);
    font-size: 0.9rem;
}

a {
    color: #ffffff;
    text-decoration: none;
    font-weight: 600;
}

a:hover {
    text-decoration: underline;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (max-width: 480px) {
    .card {
        padding: 22px;
        border-radius: 18px;
    }

    .otp {
        gap: 8px;
    }
}
</style>

</head>

<body>

<div class="card">
<p class="brand">Purple EVENTS</p>
<h2>Reset Password</h2>
<p class="subtext">Secure your account by creating a new password and entering verification code.</p>

<div class="field">
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@example.com">
</div>

<div class="field">
    <label for="password">New Password</label>
    <input id="password" type="password" placeholder="Create a new password">
</div>

<label for="otp1">Verification Code</label>
<div class="otp">
<input id="otp1" maxlength="1" inputmode="numeric" aria-label="OTP digit 1">
<input maxlength="1" inputmode="numeric" aria-label="OTP digit 2">
<input maxlength="1" inputmode="numeric" aria-label="OTP digit 3">
<input maxlength="1" inputmode="numeric" aria-label="OTP digit 4">
</div>

<button>Submit</button>

<p class="back-link"><a href="login.html">Back to Login</a></p>

</div>

</body>
</html>
