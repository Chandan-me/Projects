<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joke Generator - Laugh Out Loud</title>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }

      .navbar {
        background: linear-gradient(135deg, #2d3561 0%, #3d2d5f 100%) !important;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      }

      .navbar-brand {
        font-size: 1.5rem;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .hero-section {
        background: linear-gradient(135deg, rgba(102, 126, 234, 0.9), rgba(118, 75, 162, 0.9)),
          url("https://source.unsplash.com/random/1920x1080");
        background-size: cover;
        background-position: center;
        height: 600px;
        color: white;
        display: flex;
        align-items: center;
        text-align: center;
        position: relative;
        overflow: hidden;
      }

      .hero-section::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0,0,0,0.3);
      }

      .hero-section .container {
        position: relative;
        z-index: 1;
      }

      .hero-section h1 {
        font-size: 3.5rem;
        font-weight: bold;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
        margin-bottom: 20px;
        animation: slideInDown 0.8s ease;
      }

      .hero-section p {
        font-size: 1.25rem;
        text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        animation: slideInUp 0.8s ease;
      }

      .joke-button {
        background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
        border: none;
        padding: 12px 40px;
        font-size: 1.1rem;
        font-weight: bold;
        border-radius: 50px;
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3);
        animation: slideInUp 0.8s ease 0.2s both;
      }

      .joke-button:hover {
        background: linear-gradient(135deg, #ff8080 0%, #ff6b6b 100%);
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(255, 107, 107, 0.4);
        color: white;
      }

      .joke-modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        padding: 2rem;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        z-index: 1000;
        max-width: 550px;
        width: 90%;
        animation: zoomIn 0.3s ease;
      }

      @keyframes zoomIn {
        from {
          transform: translate(-50%, -50%) scale(0.8);
          opacity: 0;
        }
        to {
          transform: translate(-50%, -50%) scale(1);
          opacity: 1;
        }
      }

      @keyframes slideInDown {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slideInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .modal-backdrop {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        z-index: 999;
      }

      .joke-modal h3 {
        color: #667eea;
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
      }

      .joke-text {
        font-size: 1.35rem;
        margin-bottom: 1.5rem;
        line-height: 1.6;
        color: #333;
        text-align: center;
        font-weight: 500;
      }

      .joke-modal .btn {
        border-radius: 25px;
        padding: 10px 25px;
        font-weight: bold;
        transition: all 0.3s ease;
      }

      .btn-secondary {
        background: #e0e0e0;
        border: none;
        color: #333;
      }

      .btn-secondary:hover {
        background: #d0d0d0;
        color: #000;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border: none;
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #7a8fee 0%, #8555ba 100%);
      }

      footer {
        background: rgba(0,0,0,0.3);
        color: white;
        text-align: center;
        padding: 30px 0;
        margin-top: 50px;
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="#"><i class="fas fa-laugh-squint"></i> Joke Generator</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="jokes.html">Home</a>
            </li>
            <!-- <li class="nav-item">
              <button class="btn btn-warning joke-button">Get a Joke</button>
            </li> -->
          </ul>
        </div>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section">
      <div class="container text-center">
        <h1><i class="fas fa-comedy-mask"></i> Joke Generator</h1>
        <p class="lead mb-4">
          Get ready for some funny programming jokes!
        </p>
        <button class="btn btn-primary btn-lg joke-button"><i class="fas fa-dice"></i> Get Started</button>
      </div>
    </section>

    <!-- Joke Modal -->
    <div class="modal-backdrop" id="jokeBackdrop"></div>
    <div class="joke-modal" id="jokeModal">
      <h3><i class="fas fa-star"></i> Here's a joke for you! <i class="fas fa-star"></i></h3>
      <p class="joke-text" id="jokeText"></p>
      <div class="text-center">
        <button class="btn btn-secondary me-2" onclick="copyCurrentJoke()">
          <i class="fas fa-copy"></i> Copy
        </button>
        <button class="btn btn-secondary me-2" onclick="closeJokeModal()">
          <i class="fas fa-times"></i> Close
        </button>
        <button class="btn btn-primary" onclick="showAnotherJoke()">
          <i class="fas fa-laugh"></i> Another Joke
        </button>
      </div>
    </div>

    <footer>
      <div class="container">
        <p>&copy; 2026 Joke Generator. Laugh More, Stress Less! 😂</p>
        <p><small>Programming jokes to brighten your day!</small></p>
      </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
    <!-- Add the external jokes.js file -->
    <script src="jokes.js"></script>
  </body>
</html>
